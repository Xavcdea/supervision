<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervision VPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #2c3346;
    --surface2: #3a3f55;
    --border: #1e2a42;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --green: #00ffa3;
    --yellow: #ffd60a;
    --red: #ff3b5c;
    --text: #e2e8f0;
    --muted: #e8f0ff;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    width: 36px;
    height: 36px;
    border: 2px solid var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 700;
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
  }

  .title {
    font-family: var(--mono);
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .last-update {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .main {
    position: relative;
    z-index: 1;
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Stat cards row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent-color, var(--accent));
    opacity: 0.7;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Main grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
  }

  .card-title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title span {
    color: var(--accent);
    font-size: 14px;
  }

  /* Gauge */
  .gauge-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 16px;
  }

  .gauge-svg { width: 160px; height: 90px; }

  .gauge-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .gauge-fill { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease, stroke 0.4s; }

  .gauge-value {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    text-anchor: middle;
  }

  .gauge-label {
    font-family: var(--sans);
    font-size: 9px;
    fill: var(--muted);
    text-anchor: middle;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* Bar */
  .bar-row {
    margin-bottom: 14px;
  }

  .bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 6px;
  }

  .bar-name { color: var(--text); font-size: 11px; }
  .bar-pct { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  .bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    background: var(--accent);
  }

  /* Process table */
  .proc-table { width: 100%; border-collapse: collapse; }
  .proc-table th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-align: left;
    padding: 0 8px 12px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .proc-table td {
    padding: 10px 8px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    vertical-align: middle;
  }

  .proc-table tr:hover td { background: rgba(0,229,255,0.03); }

  .proc-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .proc-pid {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .mini-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .mini-bar-track { flex: 1; height: 3px; background: var(--border); border-radius: 3px; }
  .mini-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
  .mini-val { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 36px; text-align: right; }

  /* Network */
  .net-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .net-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .net-icon { font-size: 18px; margin-bottom: 6px; }
  .net-val { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .net-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

  /* System info */
  .info-grid { display: grid; gap: 12px; }
  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 12px; color: var(--muted); }
  .info-val { font-family: var(--mono); font-size: 12px; color: var(--text); }

  /* Load avg */
  .load-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
  .load-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 8px;
  }
  .load-val { font-family: var(--mono); font-size: 20px; font-weight: 700; }
  .load-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

  /* Color utilities */
  .c-green { color: var(--green); }
  .c-yellow { color: var(--yellow); }
  .c-red { color: var(--red); }
  .c-accent { color: var(--accent); }
  .c-purple { color: #a78bfa; }

  /* Disk partition */
  .disk-partition {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .disk-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .disk-mount { font-family: var(--mono); font-size: 12px; }
  .disk-size { font-size: 11px; color: var(--muted); }
  .disk-bar { height: 6px; background: var(--border); border-radius: 6px; overflow: hidden; }
  .disk-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    flex-direction: column;
    gap: 12px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: var(--red);
    font-family: var(--mono);
    font-size: 12px;
    text-align: center;
    padding: 40px;
  }

  @media (max-width: 900px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .grid { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .header { padding: 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="logo">SV</div>
    <div>
      <div class="title">Supervision VPS</div>
      <div class="subtitle">System Monitor</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="last-update" id="lastUpdate">—</div>
  </div>
</header>

<main class="main">

  <!-- Stats row -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card" style="--accent-color: var(--accent)">
      <div class="stat-label">CPU</div>
      <div class="stat-value c-accent" id="statCpu">—</div>
      <div class="stat-sub" id="statCores">—</div>
    </div>
    <div class="stat-card" style="--accent-color: #a78bfa">
      <div class="stat-label">RAM</div>
      <div class="stat-value c-purple" id="statRam">—</div>
      <div class="stat-sub" id="statRamDetail">—</div>
    </div>
    <div class="stat-card" style="--accent-color: var(--green)">
      <div class="stat-label">Uptime</div>
      <div class="stat-value c-green" id="statUptime" style="font-size:18px;padding-top:4px">—</div>
      <div class="stat-sub" id="statBoot">—</div>
    </div>
    <div class="stat-card" style="--accent-color: var(--yellow)">
      <div class="stat-label">Processus</div>
      <div class="stat-value c-yellow" id="statProcs">—</div>
      <div class="stat-sub" id="statUsers">—</div>
    </div>
  </div>

  <!-- CPU + RAM gauges -->
  <div class="grid">
    <div class="card">
      <div class="card-title"><span>◈</span> CPU</div>
      <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap">
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 160 90">
            <path class="gauge-bg" d="M 20 85 A 60 60 0 0 1 140 85" />
            <path class="gauge-fill" id="cpuArc" d="M 20 85 A 60 60 0 0 1 140 85"
              stroke-dasharray="188.5"
              stroke-dashoffset="188.5"
              stroke="var(--accent)" />
            <text class="gauge-value" id="cpuGaugeVal" x="80" y="78" fill="var(--accent)">0%</text>
            <text class="gauge-label" x="80" y="90" fill="var(--muted)">utilisation</text>
          </svg>
        </div>
        <div style="flex:1; min-width:160px">
          <div id="cpuCores"></div>
          <div style="margin-top:16px">
            <div class="load-grid" id="loadAvg">
              <div class="load-item"><div class="load-val" id="load1">—</div><div class="load-lbl">1 min</div></div>
              <div class="load-item"><div class="load-val" id="load5">—</div><div class="load-lbl">5 min</div></div>
              <div class="load-item"><div class="load-val" id="load15">—</div><div class="load-lbl">15 min</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><span>◈</span> Mémoire</div>
      <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap">
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 160 90">
            <path class="gauge-bg" d="M 20 85 A 60 60 0 0 1 140 85" />
            <path class="gauge-fill" id="ramArc" d="M 20 85 A 60 60 0 0 1 140 85"
              stroke-dasharray="188.5"
              stroke-dashoffset="188.5"
              stroke="#a78bfa" />
            <text class="gauge-value" id="ramGaugeVal" x="80" y="78" fill="#a78bfa">0%</text>
            <text class="gauge-label" x="80" y="90" fill="var(--muted)">utilisation</text>
          </svg>
        </div>
        <div style="flex:1; min-width:160px">
          <div id="ramBars"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Disque + Réseau + Infos système -->
  <div class="grid-3">
    <div class="card">
      <div class="card-title"><span>◈</span> Disque</div>
      <div id="diskPartitions"></div>
    </div>

    <div class="card">
      <div class="card-title"><span>◈</span> Réseau</div>
      <div class="net-grid" id="netStats"></div>
    </div>

    <div class="card">
      <div class="card-title"><span>◈</span> Système</div>
      <div class="info-grid" id="sysInfo"></div>
    </div>
  </div>

  <!-- Processus -->
  <div class="card">
    <div class="card-title"><span>◈</span> Top processus — CPU</div>
    <table class="proc-table">
      <thead>
        <tr>
          <th>PID</th>
          <th>Processus</th>
          <th>CPU %</th>
          <th>RAM %</th>
          <th>Statut</th>
        </tr>
      </thead>
      <tbody id="procTable"></tbody>
    </table>
  </div>

</main>

<script>
const REFRESH_MS = 3000;

function colorForPct(pct) {
  if (pct < 60) return 'var(--green)';
  if (pct < 85) return 'var(--yellow)';
  return 'var(--red)';
}

function setArc(id, pct, color) {
  const el = document.getElementById(id);
  if (!el) return;
  const total = 188.5;
  const offset = total - (pct / 100) * total;
  el.style.strokeDashoffset = offset;
  el.style.stroke = color || colorForPct(pct);
}

function render(d) {
  const { cpu, ram, disk, network, processes, system } = d;

  // Header
  document.getElementById('lastUpdate').textContent = system.timestamp;

  // Stat cards
  document.getElementById('statCpu').textContent = cpu.percent.toFixed(1) + '%';
  document.getElementById('statCpu').style.color = colorForPct(cpu.percent);
  document.getElementById('statCores').textContent = `${cpu.cores_physical} cœurs · ${cpu.frequency_mhz || '—'} MHz`;
  document.getElementById('statRam').textContent = ram.percent.toFixed(1) + '%';
  document.getElementById('statRamDetail').textContent = `${ram.used_gb} / ${ram.total_gb} Go`;
  document.getElementById('statUptime').textContent = system.uptime;
  document.getElementById('statBoot').textContent = `Démarré ${system.boot_time}`;
  document.getElementById('statProcs').textContent = system.process_count;
  document.getElementById('statUsers').textContent = `${system.users_connected} utilisateur(s) connecté(s)`;

  // CPU gauge
  setArc('cpuArc', cpu.percent);
  const cpuGV = document.getElementById('cpuGaugeVal');
  cpuGV.textContent = cpu.percent.toFixed(1) + '%';
  cpuGV.style.fill = colorForPct(cpu.percent);

  // CPU cores
  const coresEl = document.getElementById('cpuCores');
  coresEl.innerHTML = cpu.per_core.map((p, i) => `
    <div class="bar-row">
      <div class="bar-header">
        <span class="bar-name">Cœur ${i}</span>
        <span class="bar-pct">${p.toFixed(1)}%</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${colorForPct(p)}"></div></div>
    </div>`).join('');

  // Load avg
  document.getElementById('load1').textContent = cpu.load_avg_1;
  document.getElementById('load5').textContent = cpu.load_avg_5;
  document.getElementById('load15').textContent = cpu.load_avg_15;
  [cpu.load_avg_1, cpu.load_avg_5, cpu.load_avg_15].forEach((v, i) => {
    const el = ['load1','load5','load15'][i];
    document.getElementById(el).style.color = v > cpu.cores_logical ? 'var(--red)' : v > cpu.cores_logical * 0.7 ? 'var(--yellow)' : 'var(--green)';
  });

  // RAM gauge
  setArc('ramArc', ram.percent, '#a78bfa');
  const ramGV = document.getElementById('ramGaugeVal');
  ramGV.textContent = ram.percent.toFixed(1) + '%';

  // RAM bars
  document.getElementById('ramBars').innerHTML = `
    <div class="bar-row">
      <div class="bar-header"><span class="bar-name">RAM utilisée</span><span class="bar-pct">${ram.used_gb} Go / ${ram.total_gb} Go</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${ram.percent}%;background:${colorForPct(ram.percent)}"></div></div>
    </div>
    <div class="bar-row" style="margin-top:8px">
      <div class="bar-header"><span class="bar-name">Swap</span><span class="bar-pct">${ram.swap_used_gb} Go / ${ram.swap_total_gb} Go</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${ram.swap_percent}%;background:${colorForPct(ram.swap_percent)}"></div></div>
    </div>
    <div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Disponible</div>
      <div style="font-family:var(--mono);font-size:18px;color:var(--green)">${ram.available_gb} Go</div>
    </div>`;

  // Disk
  document.getElementById('diskPartitions').innerHTML = disk.partitions.map(p => `
    <div class="disk-partition">
      <div class="disk-header">
        <span class="disk-mount">${p.mountpoint}</span>
        <span class="disk-size">${p.used_gb} / ${p.total_gb} Go</span>
      </div>
      <div class="disk-bar"><div class="disk-fill" style="width:${p.percent}%;background:${colorForPct(p.percent)}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${p.percent}% · ${p.free_gb} Go libres · ${p.fstype}</div>
    </div>`).join('');

  // Network
  document.getElementById('netStats').innerHTML = `
    <div class="net-item">
      <div class="net-icon">↑</div>
      <div class="net-val c-accent">${network.bytes_sent_mb} Mo</div>
      <div class="net-lbl">Envoyés</div>
    </div>
    <div class="net-item">
      <div class="net-icon">↓</div>
      <div class="net-val c-green">${network.bytes_recv_mb} Mo</div>
      <div class="net-lbl">Reçus</div>
    </div>
    <div class="net-item">
      <div class="net-val" style="font-size:14px">${network.packets_sent.toLocaleString('fr')}</div>
      <div class="net-lbl">Paquets envoyés</div>
    </div>
    <div class="net-item">
      <div class="net-val" style="font-size:14px">${network.packets_recv.toLocaleString('fr')}</div>
      <div class="net-lbl">Paquets reçus</div>
    </div>`;

  // System info
  document.getElementById('sysInfo').innerHTML = `
    <div class="info-row"><span class="info-key">Uptime</span><span class="info-val c-green">${system.uptime}</span></div>
    <div class="info-row"><span class="info-key">Démarrage</span><span class="info-val">${system.boot_time}</span></div>
    <div class="info-row"><span class="info-key">Processus</span><span class="info-val">${system.process_count}</span></div>
    <div class="info-row"><span class="info-key">Utilisateurs</span><span class="info-val">${system.users_connected}</span></div>
    <div class="info-row"><span class="info-key">Cœurs physiques</span><span class="info-val">${cpu.cores_physical}</span></div>
    <div class="info-row"><span class="info-key">Cœurs logiques</span><span class="info-val">${cpu.cores_logical}</span></div>
    <div class="info-row"><span class="info-key">Fréquence CPU</span><span class="info-val">${cpu.frequency_mhz || '—'} MHz</span></div>`;

  // Processes
  document.getElementById('procTable').innerHTML = processes.map(p => `
    <tr>
      <td><span class="proc-pid">${p.pid}</span></td>
      <td><span class="proc-name">${p.name}</span></td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.min(p.cpu_percent||0,100)}%;background:${colorForPct(p.cpu_percent||0)}"></div></div>
          <span class="mini-val">${(p.cpu_percent||0).toFixed(1)}%</span>
        </div>
      </td>
      <td>
        <div class="mini-bar-wrap">
          <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${Math.min(p.memory_percent||0,100)}%;background:#a78bfa"></div></div>
          <span class="mini-val">${(p.memory_percent||0).toFixed(1)}%</span>
        </div>
      </td>
      <td><span style="font-size:10px;font-family:var(--mono);color:var(--muted)">${p.status}</span></td>
    </tr>`).join('');
}

async function fetchMetrics() {
  try {
    const res = await fetch('/api/metrics');
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    render(data);
    document.getElementById('statusDot').style.background = 'var(--green)';
    document.getElementById('statusDot').style.boxShadow = '0 0 8px var(--green)';
  } catch (e) {
    document.getElementById('statusDot').style.background = 'var(--red)';
    document.getElementById('statusDot').style.boxShadow = '0 0 8px var(--red)';
    console.error('Fetch error:', e);
  }
}

fetchMetrics();
setInterval(fetchMetrics, REFRESH_MS);
</script>
</body>
</html>
